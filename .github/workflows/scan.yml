name: 스테이지 스캔

on:
  schedule:
    # 감지기 — 장중, :00 피하고 오프피크 분으로 분산 (누락 대비 중복)
    - cron: "13 1,3,5 * * 1-5"    # KST 10:13 / 12:13 / 14:13
    - cron: "37 2,4 * * 1-5"      # KST 11:37 / 13:37  (백업 슬롯)
    # 전략 포트폴리오 — 장마감(15:30 KST) 이후 반복 (멱등: 같은 종가라 여러 번 돌아도 결과 동일)
    - cron: "33 6 * * 1-5"        # KST 15:33
    - cron: "17 7 * * 1-5"        # KST 16:17  (백업)
    - cron: "27 8 * * 1-5"        # KST 17:27  (백업)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 스캔 실행
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          # KIS 토큰 24h 공유(Worker KV) 인증 — 없으면 러너마다 재발급(분당 1회 제한 위험).
          # value-screen.yml과 동일 패턴. data_provider._kis_token_remote_get/put이 사용.
          NEXUS_ADMIN_TOKEN: ${{ secrets.NEXUS_ADMIN_TOKEN }}
        run: python scanner/run_scan.py

      - name: 결과 커밋
        run: |
          bash .github/scripts/commit-data.sh "scan: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')" docs/data
