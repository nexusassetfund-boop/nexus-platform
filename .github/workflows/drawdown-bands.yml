name: 낙폭·밸류밴드 일간 스캔
on:
  schedule:
    - cron: "20 7 * * 1-5"    # 매일 평일 16:20 KST (장마감·본스캔 이후) — 가격 기반 지표라 일간 갱신
  workflow_dispatch: {}
permissions:
  contents: write
concurrency: { group: drawdown-bands, cancel-in-progress: false }
jobs:
  bands:
    runs-on: ubuntu-latest
    timeout-minutes: 45    # 필터 통과 ~300종목 × 종목당 수 초 (해외 러너에서 KRX 응답 느림)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: 의존성 설치
        run: pip install -r requirements.txt
      - name: 낙폭·밸류밴드 스크리닝
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python scanner/drawdown_bands.py
      - name: 결과 커밋
        run: |
          test -f docs/data/drawdown_bands.json || { echo "출력 없음 — 커밋 생략"; exit 0; }
          bash .github/scripts/commit-data.sh "drawdown-bands: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')" docs/data
      - name: KV 즉시 반영 (다음 스캔 동기화 대기 없이)
        env: { NEXUS_ADMIN_TOKEN: "${{ secrets.NEXUS_ADMIN_TOKEN }}" }
        run: |
          test -f docs/data/drawdown_bands.json || exit 0
          python - > /tmp/push.json <<'PY'
          import json
          print(json.dumps({'files': {'drawdown_bands.json': json.load(open('docs/data/drawdown_bands.json'))}}))
          PY
          curl -sf -X POST "https://nexus-platform.nexusassetfund.workers.dev/api/push" \
            -H "Authorization: Bearer $NEXUS_ADMIN_TOKEN" -H "Content-Type: application/json" \
            --data @/tmp/push.json || echo "KV push 실패 — 다음 스캔 동기화 때 자동 반영됨"
