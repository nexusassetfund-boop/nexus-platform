name: 시황 브리핑

on:
  schedule:
    - cron: "20 22 * * 0-4"   # KST 07:20 장전 (UTC 전날 22:20, 일~목 = KST 월~금 아침)
    - cron: "40 6 * * 1-5"    # KST 15:40 장마감
  workflow_dispatch:
    inputs:
      mode:
        description: "am(장전) 또는 pm(장마감) — 비우면 시각으로 자동"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt requests lxml

      - name: 모드 결정
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "20 22 * * 0-4" ]; then
            echo "mode=am" >> "$GITHUB_OUTPUT"
          else
            echo "mode=pm" >> "$GITHUB_OUTPUT"
          fi

      - name: 시장 데이터 수집 (확정 숫자)
        run: python scanner/briefing_data.py --mode ${{ steps.mode.outputs.mode }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Claude Code 설치
        run: npm install -g @anthropic-ai/claude-code

      - name: 브리핑 생성 (Claude — 웹 리서치 + 해설 작성)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "$(cat scanner/briefing_prompt.md)" \
            --allowedTools "Read,Write,WebSearch,WebFetch" \
            --permission-mode acceptEdits \
            --max-turns 50

      - name: Worker에 게시
        env:
          NEXUS_ADMIN_TOKEN: ${{ secrets.NEXUS_ADMIN_TOKEN }}
        run: python scanner/post_briefing.py
