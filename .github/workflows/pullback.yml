name: 깡토 눌림목 일간 스캔
on:
  schedule:
    - cron: "25 7 * * 1-5"    # 매일 평일 16:25 KST (장마감·본스캔 이후)
  workflow_dispatch: {}
permissions:
  contents: write
concurrency: { group: pullback, cancel-in-progress: false }
jobs:
  pullback:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # 전종목 스냅샷 8회 + 필터 통과 ~150종목 개별 일봉
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: 의존성 설치
        run: pip install -r requirements.txt
      - name: 눌림목 스크리닝
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python scanner/pullback_screener.py
      - name: 결과 커밋
        run: |
          test -f docs/data/pullback.json || { echo "출력 없음 — 커밋 생략"; exit 0; }
          bash .github/scripts/commit-data.sh "pullback: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')" docs/data
      - name: KV 즉시 반영 (다음 스캔 동기화 대기 없이)
        env: { NEXUS_ADMIN_TOKEN: "${{ secrets.NEXUS_ADMIN_TOKEN }}" }
        run: |
          test -f docs/data/pullback.json || exit 0
          python - > /tmp/push.json <<'PY'
          import json
          print(json.dumps({'files': {'pullback.json': json.load(open('docs/data/pullback.json'))}}))
          PY
          curl -sf -X POST "https://nexus-platform.nexusassetfund.workers.dev/api/push" \
            -H "Authorization: Bearer $NEXUS_ADMIN_TOKEN" -H "Content-Type: application/json" \
            --data @/tmp/push.json || echo "KV push 실패 — 다음 스캔 동기화 때 자동 반영됨"
