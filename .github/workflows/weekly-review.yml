name: 전략 주간 복기

on:
  schedule:
    - cron: "20 7 * * 5"   # KST 금 16:20 (마감 시퀀스 완료 후)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install requests

      - name: 복기 데이터 수집 (확정 숫자)
        run: python scanner/review_data.py

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Claude Code 설치
        run: npm install -g @anthropic-ai/claude-code

      - name: 복기 리포트 생성 (Claude)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "$(cat scanner/review_prompt.md)" \
            --allowedTools "Read,Write,WebSearch,WebFetch" \
            --permission-mode acceptEdits \
            --max-turns 40

      - name: 병합·게시
        env:
          NEXUS_ADMIN_TOKEN: ${{ secrets.NEXUS_ADMIN_TOKEN }}
        run: python scanner/post_review.py

      - name: 결과 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/weekly_review.json
          git diff --cached --quiet || (git commit -m "review: $(TZ=Asia/Seoul date '+%Y-%m-%d') 주간 복기" && git pull --rebase origin main && git push)
